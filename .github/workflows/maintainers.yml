name: Sync Maintainers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["scripts/userstyles.yml"]

jobs:
  sync-maintainers:
    if: github.repository == 'catppuccin/userstyles'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Deno
        uses: nekowinston/setup-deno@a790e9ad1e6b1c727a4ea621a8a8219b1f2c373d # main
        with:
          deno-version: v2.3.5

      - name: Sync maintainers
        run: deno task ci:sync-maintainers
        env:
          GITHUB_TOKEN: ${{ secrets.USERSTYLES_TOKEN }}
