name: Update Deno Lock

on:
  pull_request:
    branches: [main]
    paths: ["deno.json"]

jobs:
  deno-lock:
    name: Update Deno lock
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Deno
        uses: nekowinston/setup-deno@a790e9ad1e6b1c727a4ea621a8a8219b1f2c373d # main
        with:
          deno-version: v2.3.5

      - name: Regenerate Deno lock
        run: deno cache **/*.ts --lock=deno.lock

      - name: Commit & push changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
        with:
          message: "chore: regenerate `deno.lock`"
          default_author: github_actions
          push: true
