name: Deno Check

on:
  push:
    branches: [main]
    paths: ["**/*.ts"]
  pull_request:
    branches: [main]
    paths: ["**/*.ts"]

jobs:
  check:
    if: github.repository == 'catppuccin/userstyles'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Deno
        uses: nekowinston/setup-deno@a790e9ad1e6b1c727a4ea621a8a8219b1f2c373d # main
        with:
          deno-version: v2.3.5

      - name: Check
        run: |
          deno lint
          deno check **/*.ts
